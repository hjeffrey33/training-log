<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8fafc;--surface:#fff;--surface2:#eef2f7;--surface3:#e2e8f0;--border:rgba(15,23,42,.08);--border2:rgba(15,23,42,.16);--text:#0f172a;--muted:#64748b;--hint:#94a3b8;--up:#16a34a;--up-bg:#f0fdf4;--same:#2563eb;--same-bg:#eff6ff;--down:#dc2626;--down-bg:#fef2f2;--r:12px;--rlg:20px;--shadow:0 8px 22px rgba(15,23,42,.06)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{min-height:100%;overflow-x:hidden}body{background:var(--bg);color:var(--text);font-family:Geist,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;line-height:1.45}button,input{font-family:inherit}button{cursor:pointer}

.app{display:flex;height:calc(100vh - 52px)}.sidebar{width:190px;min-width:190px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}.sidebar-label{padding:14px 12px 7px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--hint)}.week-list{flex:1;overflow:auto;padding:0 8px}.week-item{padding:10px;border-radius:var(--r);margin-bottom:4px;border:1px solid transparent;cursor:pointer}.week-item:hover,.week-item.active{background:var(--surface2);border-color:var(--border2)}.wi-label{font-weight:700}.wi-date{font-size:11px;color:var(--muted);font-family:"Geist Mono",monospace}.new-week-btn{margin:8px;border:1px dashed var(--border2);background:transparent;color:var(--muted);border-radius:var(--r);padding:10px}.new-week-btn:hover{background:var(--surface2);color:var(--text)}
.main{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}.inner{padding:20px 24px}.empty{text-align:center;padding:82px 20px}.empty h2{font-size:18px;margin-bottom:8px}.empty p{color:var(--muted);margin-bottom:22px}.btn-primary{border:none;background:var(--text);color:#fff;border-radius:var(--r);padding:12px 22px;font-weight:700;min-height:44px}
.stats-row{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:10px;margin-bottom:16px}.stat-card,.week-input-card,.history-card,.chart-card,.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);box-shadow:var(--shadow)}.stat-card{padding:14px}.stat-label{font-size:10px;font-weight:800;color:var(--hint);text-transform:uppercase;letter-spacing:.08em}.stat-value{font-size:26px;font-weight:800;line-height:1;margin-top:5px}.stat-value.up{color:var(--up)}.stat-value.dn{color:var(--down)}.stat-sub{font-size:11px;color:var(--hint);margin-top:4px}

.week-inputs-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}.week-input-card,.history-card,.chart-card{padding:16px}.card-title{font-weight:800;margin-bottom:12px}.card-sub{font-size:12px;color:var(--muted);margin-bottom:10px}.bw-inline{display:flex;align-items:center;gap:8px}.bw-input{width:120px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:9px 11px;color:var(--text);font-size:16px;font-family:"Geist Mono",monospace}.bw-unit{color:var(--muted)}.cal-days{display:grid;grid-template-columns:repeat(7,minmax(42px,1fr));gap:5px}.cal-day-btn{min-width:0;width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:8px 6px;min-height:52px}.cal-day-btn .cdn{display:block;font-size:9px;font-weight:800;color:var(--hint);text-transform:uppercase}.cal-day-btn .cdv{display:block;font-size:15px;color:var(--text)}.cal-day-btn.hit{background:var(--up-bg);border-color:#bbf7d0}.cal-day-btn.hit .cdn,.cal-day-btn.hit .cdv{color:var(--up)}.cal-day-btn.miss{background:var(--down-bg);border-color:#fecaca}.cal-day-btn.miss .cdn,.cal-day-btn.miss .cdv{color:var(--down)}

.menu{display:none;position:absolute;right:0;top:calc(100% + 6px);background:var(--surface);border:1px solid var(--border2);border-radius:var(--rlg);box-shadow:0 12px 30px rgba(0,0,0,.16);min-width:210px;z-index:60;overflow:hidden}.menu button,.menu-row{display:block;width:100%;border:none;background:transparent;color:var(--text);text-align:left;padding:12px 15px;font-size:13px}.menu button:hover{background:var(--surface2)}.menu-label{font-size:10px;font-weight:800;color:var(--hint);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;align-items:center;justify-content:center;padding:18px}.modal-card{background:var(--surface);border-radius:22px;width:100%;max-width:760px;max-height:88vh;overflow:auto;box-shadow:0 14px 40px rgba(0,0,0,.22)}.modal-hdr,.modal-footer{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--border)}.modal-footer{border-top:1px solid var(--border);border-bottom:none;justify-content:flex-end;gap:8px}.modal-body{padding:18px 22px}.day-palette{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}.day-token-wrap{display:flex;align-items:center;gap:8px}.pill{border:none;border-radius:999px;color:#fff;min-width:74px;max-width:120px;height:58px;padding:0 12px;font-size:14px;line-height:1.05;font-weight:800;display:flex;align-items:center;justify-content:center;text-align:center;box-shadow:0 8px 20px rgba(15,23,42,.12);touch-action:none;cursor:grab;white-space:normal;overflow:hidden;word-break:break-word}.pill:active,.sched-filled:active{cursor:grabbing;transform:scale(.98)}.day-remove{width:42px;height:42px;border:1px solid var(--border2);background:var(--surface);color:var(--muted);border-radius:50%;font-size:18px}.sched-calendar{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;margin-top:12px}.sched-cell{min-height:108px;border:1px dashed var(--border2);border-radius:16px;background:var(--surface2);padding:8px;transition:.12s;cursor:pointer}.sched-cell.drag-over,.sched-cell.touch-over{border-color:var(--text);background:var(--surface3);transform:translateY(-1px)}.drag-ghost{position:fixed;z-index:9999;pointer-events:none;border-radius:999px;color:#fff;min-width:74px;max-width:130px;height:58px;padding:0 12px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:14px;font-weight:800;line-height:1.05;box-shadow:0 14px 28px rgba(15,23,42,.24);opacity:.92;transform:translate(-50%,-50%);word-break:break-word;overflow:hidden}.sched-day-name{font-size:10px;font-weight:800;color:var(--hint);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}.sched-filled{position:relative;border-radius:14px;min-height:66px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;text-align:center;padding:10px 30px 10px 10px;font-size:14px;line-height:1.1;box-shadow:0 8px 20px rgba(15,23,42,.12);touch-action:none;cursor:grab;white-space:normal;overflow:hidden;word-break:break-word}.sched-x{position:absolute;right:6px;top:6px;border:none;border-radius:50%;background:rgba(255,255,255,.25);color:#fff;width:24px;height:24px;font-size:16px}.input{border:1px solid var(--border2);background:var(--surface2);color:var(--text);border-radius:var(--r);padding:10px;width:100%}
@container (max-width:620px){.ov-grid,.ov-grid[style]{display:grid!important;grid-template-columns:repeat(6,1fr)!important;gap:10px!important;margin-bottom:16px!important;justify-content:start!important}.ov-card{grid-column:span 2;min-width:0}.ov-card:nth-child(4):nth-last-child(2){grid-column:2 / span 2}.ov-card:nth-child(5):nth-last-child(1){grid-column:4 / span 2}.ov-card:nth-child(4):last-child{grid-column:3 / span 2}}
@media(max-width:960px){#wk-picker-btn{display:inline-flex!important;align-items:center}.sidebar{display:none}.app{display:block;height:calc(100vh - 52px)}.main{height:100%;width:100%;overflow-x:hidden}.inner{padding:20px 24px;max-width:100%;overflow-x:hidden}}
@media(max-width:760px){.stats-row{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.stat-card{min-width:0}}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}.week-inputs-row{grid-template-columns:1fr}.ex-fields{grid-template-columns:70px 100px 1fr}.ex-fields .ex-field:nth-child(4){grid-column:1/-1;border-top:1px solid var(--border);border-right:none}}
@media(max-width:480px){body{min-height:100dvh}header{height:54px;padding:8px 12px}.logo{font-size:13px}.app{height:calc(100dvh - 54px)}.inner{padding:12px}.stats-row{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.stat-card{padding:11px}.stat-value{font-size:22px}.tabs{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}.tab{width:100%;padding:8px 6px}.ov-grid,.ov-grid[style]{display:grid!important;grid-template-columns:repeat(6,1fr)!important;gap:10px!important;margin-bottom:16px!important;justify-content:start!important}.ov-card{grid-column:span 2;min-width:0}.ov-card:nth-child(4):nth-last-child(2){grid-column:2 / span 2}.ov-card:nth-child(5):nth-last-child(1){grid-column:4 / span 2}.ov-card:nth-child(4):last-child{grid-column:3 / span 2}.ov-card{padding:12px 9px;min-height:118px}.ov-type{font-size:13px}.ov-name,.ov-meta{font-size:11px}.week-input-card,.history-card,.chart-card{padding:13px}.day-hdr{display:grid;grid-template-columns:auto 1fr;gap:8px}.date-wrap{grid-column:1/-1;margin-left:0;display:grid;grid-template-columns:44px 1fr}.date-wrap input{width:100%}.ex-top{display:grid;grid-template-columns:26px 1fr 38px;gap:6px 8px}.ex-muscle-input{grid-column:2/4;width:100%;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px}.ex-del-btn{grid-column:3;grid-row:1}.ex-fields{grid-template-columns:.75fr .95fr 1.3fr}.ex-field{padding:9px 8px}.ex-fields .ex-field:nth-child(3){border-right:none}.ex-field-lbl{font-size:9px;white-space:nowrap}.prog-btn{min-height:42px}.cal-days{grid-template-columns:repeat(7,minmax(0,1fr));gap:4px}.cal-day-btn{padding:7px 2px}.sched-calendar{display:flex;overflow-x:auto}.sched-cell{flex:0 0 118px;min-height:118px}.pill{min-width:78px;height:62px}.sched-filled{min-height:76px}.modal{padding:10px;align-items:flex-start}.modal-card{max-height:calc(100dvh - 20px)}.toast{bottom:max(24px,env(safe-area-inset-bottom))}}
@media(max-width:360px){.ov-grid,.ov-grid[style]{display:grid!important;grid-template-columns:1fr!important}.cal-days{grid-template-columns:repeat(4,minmax(0,1fr))}}
</style>
</head>
<body>
<header>
  <div class="logo">Training Log</div>
  <div class="header-right">
    <button id="wk-picker-btn" class="hbtn">☰ Weeks</button>
    <div style="position:relative">
      <button class="hbtn" id="settings-menu-btn">⋮</button>
      <div class="menu" id="settings-menu">
        <button id="backup-btn">⬇ Backup data</button>
        <button id="import-btn">⬆ Import backup</button>
        <button id="clear-btn" style="color:var(--down)">🗑 Clear all data</button>
        <div class="menu-row" style="border-top:1px solid var(--border)">
          <div class="menu-label">Sync</div>
          <div class="sync-badge"><span class="sync-dot" id="sync-dot"></span><span id="sync-label">local</span></div>
        </div>
      </div>
    </div>
    <input id="backup-file-input" type="file" accept=".csv,.json" style="display:none">
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-label">Weeks</div>
    <div class="week-list" id="week-list"></div>
    <button class="new-week-btn" id="new-week-sidebar">+ New week</button>
  </aside>
  <main class="main">
    <div class="inner">
      <div id="empty-state" class="empty">
        <h2>No weeks logged yet</h2>
        <p>Start your first week to begin tracking</p>
        <button class="btn-primary" id="start-week-btn">Start Week 1</button>
      </div>
      <div id="week-content" style="display:none"></div>
    </div>
  </main>
</div>

<div id="toast" class="toast"></div>

<div id="wk-picker" class="modal">
  <div class="modal-card" style="max-width:520px;align-self:flex-end;border-radius:22px 22px 0 0">
    <div class="modal-hdr"><b>Weeks</b><button class="hbtn" id="close-wk-picker">×</button></div>
    <div id="wk-picker-list" style="padding:8px;max-height:55vh;overflow:auto"></div>
    <div class="modal-footer"><button class="btn-primary" style="width:100%" id="new-week-picker">+ New week</button></div>
  </div>
</div>

<div id="schedule-modal" class="modal">
  <div class="modal-card">
    <div class="modal-hdr">
      <div><b>Schedule</b><div style="color:var(--muted);font-size:12px;margin-top:3px">Build your training week</div></div>
      <button class="hbtn" id="close-schedule">×</button>
    </div>
    <div class="modal-body">
      <label style="font-weight:800;font-size:13px">Create training days</label>
      <div style="display:flex;gap:8px;margin-top:8px">
        <input id="new-day-name" class="input" placeholder="e.g. Push, Pull, Legs" onkeydown="if(event.key==='Enter'){event.preventDefault();addScheduleDay()}">
        <button class="btn-primary" id="add-day-btn">Add</button>
      </div>
      <div class="day-palette" id="day-palette"></div>
      <div style="font-weight:800;font-size:13px;margin-top:20px">Assign days</div>
      <div class="sched-calendar" id="sched-calendar"></div>
    </div>
    <div class="modal-footer">
      <button class="hbtn" id="cancel-schedule">Cancel</button>
      <button class="btn-primary" id="save-schedule">Save schedule</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
const STORAGE_KEY='tl_v10';
const DAY_NAMES=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const COLORS=['#2563eb','#059669','#d97706','#7c3aed','#dc2626','#0891b2','#65a30d','#c026d3','#ea580c'];
const DEFAULT_DAYS=[
  {key:'push',label:'Push',fullname:'Push day',color:'#2563eb',tc:'#fff'},
  {key:'pull',label:'Pull',fullname:'Pull day',color:'#059669',tc:'#fff'},
  {key:'legs',label:'Legs',fullname:'Legs day',color:'#d97706',tc:'#fff'},
  {key:'upper',label:'Upper',fullname:'Upper day',color:'#7c3aed',tc:'#fff'},
  {key:'lower',label:'Lower',fullname:'Lower day',color:'#dc2626',tc:'#fff'}
];
let state={weeks:[],activeWeek:null,activeDay:'overview',customExercises:{},
  scheduleConfig:{days:DEFAULT_DAYS.map(d=>({...d})),assignments:{0:'push',1:'pull',2:'legs',3:'upper',4:'lower'}}};
let saveTimer=null;
const $=id=>document.getElementById(id);
const today=()=>new Date().toLocaleDateString('en-CA');
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function escAttr(s){return esc(s).replace(/'/g,'&#39;')}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function setSS(status,text){const d=$('sync-dot'),l=$('sync-label');if(d)d.className='sync-dot '+(status||'');if(l)l.textContent=text||'local'}
function cloneDefaultSchedule(){return{days:DEFAULT_DAYS.map(d=>({...d})),assignments:{0:'push',1:'pull',2:'legs',3:'upper',4:'lower'}}}
function getSchedule(){
  if(!state.scheduleConfig)state.scheduleConfig=cloneDefaultSchedule();
  if(!Array.isArray(state.scheduleConfig.days))state.scheduleConfig.days=DEFAULT_DAYS.map(d=>({...d}));
  if(!state.scheduleConfig.assignments)state.scheduleConfig.assignments={};
  return state.scheduleConfig
}
function getActiveDays(){
  const sc=getSchedule();
  const used=[...new Set(Object.values(sc.assignments).filter(Boolean))];
  return sc.days.filter(d=>used.includes(d.key))
}
function getDay(key){
  return getSchedule().days.find(d=>d.key===key)||DEFAULT_DAYS.find(d=>d.key===key)||{key,label:key,fullname:key,color:'#64748b',tc:'#fff'}
}
function defaultExercises(){
  return[{title:null,exercises:[{name:'Exercise 1',muscle:'',sets:3,reps:'8-12'},{name:'Exercise 2',muscle:'',sets:3,reps:'8-12'}]}]
}
function gex(key){
  state.customExercises=state.customExercises||{};
  if(!state.customExercises[key])state.customExercises[key]=defaultExercises();
  return state.customExercises[key]
}
function gw(id){return state.weeks.find(w=>w.id===id)}
function ge(wid,dk,idx){const w=gw(wid);return(w&&w.data&&w.data[dk]&&w.data[dk][String(idx)])||{}}
function normaliseState(raw){
  const s=raw&&typeof raw==='object'?raw:{};
  s.weeks=Array.isArray(s.weeks)?s.weeks:[];
  s.customExercises=s.customExercises&&typeof s.customExercises==='object'?s.customExercises:{};
  s.scheduleConfig=s.scheduleConfig&&typeof s.scheduleConfig==='object'?s.scheduleConfig:cloneDefaultSchedule();
  if(!Array.isArray(s.scheduleConfig.days))s.scheduleConfig.days=DEFAULT_DAYS.map(d=>({...d}));
  if(!s.scheduleConfig.assignments)s.scheduleConfig.assignments={0:'push',1:'pull',2:'legs',3:'upper',4:'lower'};
  s.weeks.forEach((w,i)=>{
    w.id=w.id||('w'+Date.now()+i);
    w.num=w.num||i+1;
    w.label=w.label||('Week '+w.num);
    w.startDate=w.startDate||today();
    w.data=w.data||{};
    w.calories=w.calories||{}
  });
  if(s.activeWeek&&!s.weeks.some(w=>w.id===s.activeWeek))s.activeWeek=null;
  if(!s.activeWeek&&s.weeks.length)s.activeWeek=s.weeks[s.weeks.length-1].id;
  // Always reset to overview on load so blank panels never show
  s.activeDay='overview';
  return s
}

function calcStats(w){
  let days=0,up=0,down=0;
  getActiveDays().forEach(d=>{
    const dd=(w.data&&w.data[d.key])||{};
    if(Object.values(dd).some(e=>e&&typeof e==='object'&&(e.weight||e.sets||e.reps)))days++;
    Object.values(dd).forEach(e=>{
      if(e&&typeof e==='object'){if(e.prog==='up')up++;if(e.prog==='down')down++}
    })
  });
  return{days,up,down}
}

}

function mkSVGChart(weeks, getData, color){
  const vals = weeks.map(getData);
  const hasData = vals.some(v=>v!==null);
  if(!hasData) return '<div class="chart-box" style="height:120px">No data logged yet</div>';
  const W=420, H=120, pad={t:12,r:12,b:24,l:42};
  const chartW=W-pad.l-pad.r, chartH=H-pad.t-pad.b;
  const nonNull=vals.filter(v=>v!==null);
  const mn=Math.min(...nonNull), mx=Math.max(...nonNull);
  const range=mx-mn||1;
  const xStep=vals.length>1?chartW/(vals.length-1):chartW;
  const pts=vals.map((v,i)=>v===null?null:{
    x:pad.l+(vals.length>1?i*xStep:chartW/2),
    y:pad.t+chartH-(v-mn)/range*chartH
  });
  let path='', dots='';
  let prev=null;
  pts.forEach((p,i)=>{
    if(!p){prev=null;return}
    if(prev) path+=`L${p.x.toFixed(1)},${p.y.toFixed(1)}`;
    else path+=`M${p.x.toFixed(1)},${p.y.toFixed(1)}`;
    dots+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="${color}"/>`;
    // value label
    dots+=`<text x="${p.x.toFixed(1)}" y="${(p.y-8).toFixed(1)}" text-anchor="middle" font-size="10" fill="#64748b">${vals[i]}</text>`;
    prev=p;
  });
  // y axis labels
  let yLabels='';
  [0,0.5,1].forEach(t=>{
    const v=(mn+range*t).toFixed(1).replace('.0','');
    const y=(pad.t+chartH-t*chartH).toFixed(1);
    yLabels+=`<text x="${pad.l-6}" y="${parseFloat(y)+4}" text-anchor="end" font-size="10" fill="#94a3b8">${v}</text>`;
    yLabels+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#e2e8f0" stroke-width="1"/>`;
  });
  // x axis week labels
  let xLabels='';
  vals.forEach((v,i)=>{
    const x=(pad.l+(vals.length>1?i*xStep:chartW/2)).toFixed(1);
    xLabels+=`<text x="${x}" y="${H-6}" text-anchor="middle" font-size="10" fill="#94a3b8">W${i+1}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block">
    ${yLabels}${xLabels}
    <path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>
    ${dots}
  </svg>`;
}

function swapScheduleSlots(a,b){

function renderScheduleConfig(){
  const sc=getSchedule(),pal=$('day-palette'),cal=$('sched-calendar');
  if(!pal||!cal)return;
  pal.innerHTML='';
  sc.days.forEach(d=>{
    const wrap=document.createElement('div');
    wrap.className='day-token-wrap';
    wrap.innerHTML=`<button class="pill" data-day-key="${d.key}" style="background:${d.color}">${esc(d.label)}</button><button class="day-remove" data-remove-day="${d.key}">×</button>`;
    const pill=wrap.querySelector('.pill');
    // Click to select
    pill.addEventListener('click',()=>{window._selectedDay=d.key;toast('Tap a weekday cell to assign '+d.label)});
    // Pointer drag (touch + mouse)
    attachPointerDrag(pill,{dayKey:d.key,label:d.label,color:d.color});
    // Remove button
    wrap.querySelector('.day-remove').addEventListener('click',()=>removeScheduleDay(d.key));
    pal.appendChild(wrap)
  });

  cal.innerHTML='';
  DAY_NAMES.forEach((dn,i)=>{
    const key=sc.assignments[i],d=key?getDay(key):null;
    const cell=document.createElement('div');
    cell.className='sched-cell';
    cell.dataset.slot=String(i);
    cell.innerHTML=`<div class="sched-day-name">${dn}</div>${d
      ?`<div class="sched-filled" data-slot="${i}" style="background:${d.color}">${esc(d.label)}<button class="sched-x" data-clear-slot="${i}">×</button></div>`
      :`<div style="height:66px;display:flex;align-items:center;justify-content:center;color:var(--hint);font-size:12px;text-align:center;pointer-events:none">Drop here</div>`}`;

    // Click to assign selected day
    cell.addEventListener('click',e=>{
      if(e.target.closest('.sched-x'))return;
      if(e.target.closest('.sched-filled'))return;
      if(window._selectedDay){assignDay(i,window._selectedDay);window._selectedDay=null}
    });

    // × clear button
    const xBtn=cell.querySelector('.sched-x');
    if(xBtn)xBtn.addEventListener('click',e=>{e.stopPropagation();assignDay(i,null)});

    // Filled cell drag (for swap)
    const filled=cell.querySelector('.sched-filled');
    if(filled){
      attachPointerDrag(filled,{slot:i,label:d.label,color:d.color})
    }
    cal.appendChild(cell)
  })
}

function attachPointerDrag(el,payload){
  let sx=0,sy=0,dragging=false,ghost=null,lastCell=null;
  el.addEventListener('pointerdown',e=>{
    if(e.target.closest('.sched-x,.day-remove'))return;
    sx=e.clientX;sy=e.clientY;dragging=false;
    const move=ev=>{
      const dist=Math.hypot(ev.clientX-sx,ev.clientY-sy);
      if(!dragging&&dist<8)return;
      ev.preventDefault();
      if(!dragging){
        dragging=true;
        ghost=document.createElement('div');
        ghost.className='drag-ghost';
        ghost.style.background=payload.color;
        ghost.textContent=payload.label;
        document.body.appendChild(ghost);
        el.style.opacity='.45'
      }
      // Hit-test BEFORE moving ghost so ghost doesn't block elementFromPoint
      if(ghost)ghost.style.visibility='hidden';
      const under=document.elementFromPoint(ev.clientX,ev.clientY);
      if(ghost){ghost.style.left=ev.clientX+'px';ghost.style.top=ev.clientY+'px';ghost.style.visibility=''}
      const cell=under&&under.closest&&under.closest('.sched-cell');
      if(lastCell&&lastCell!==cell)lastCell.classList.remove('touch-over');
      if(cell)cell.classList.add('touch-over');
      lastCell=cell
    };
    const up=ev=>{
      document.removeEventListener('pointermove',move);
      document.removeEventListener('pointerup',up);
      document.removeEventListener('pointercancel',up);
      const dropCell=lastCell;
      if(lastCell)lastCell.classList.remove('touch-over');
      el.style.opacity='';
      if(ghost){ghost.remove();ghost=null}
      if(!dragging)return;
      // Use lastCell tracked during move — more reliable than elementFromPoint after ghost removal
      if(!dropCell){
        // Fallback: try elementFromPoint
        const under=document.elementFromPoint(ev.clientX,ev.clientY);
        const cell2=under&&under.closest&&under.closest('.sched-cell');
        if(cell2){
          const to=Number(cell2.dataset.slot);
          if(payload.slot!==undefined)swapScheduleSlots(Number(payload.slot),to);
          else if(payload.dayKey)assignDay(to,payload.dayKey)
        }
        return;
      }
      const to=Number(dropCell.dataset.slot);
      if(payload.slot!==undefined)swapScheduleSlots(Number(payload.slot),to);
      else if(payload.dayKey)assignDay(to,payload.dayKey)
    };
    document.addEventListener('pointermove',move,{passive:false});
    document.addEventListener('pointerup',up);
    document.addEventListener('pointercancel',up)
  })
}

function saveScheduleConfig(){
  window._selectedDay=null;
  closeScheduleConfig();
  renderMain();
  toast('Schedule saved')
}

function toggleSettingsMenu(){
  const m=$('settings-menu');
  const open=m.style.display==='block';
  m.style.display=open?'none':'block';
  if(!open){
    const close=e=>{if(!e.target.closest('#settings-menu')&&!e.target.closest('#settings-menu-btn')){m.style.display='none';document.removeEventListener('click',close)}};
    setTimeout(()=>document.addEventListener('click',close),0)
  }
}
function closeSettingsMenu(){const m=$('settings-menu');if(m)m.style.display='none'}

function backupDataFile(){
  const csv='training_log_json\n"'+JSON.stringify(state).replace(/"/g,'""')+'"\n';
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='training-log-backup.csv';a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),500);toast('Backup downloaded')
}
function importBackupFile(ev){
  const f=ev.target.files&&ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      let txt=String(r.result||'').trim();
      if(txt.startsWith('training_log_json'))txt=txt.split(/\r?\n/)[1].replace(/^"|"$/g,'').replace(/""/g,'"');
      state=normaliseState(JSON.parse(txt));
      scheduleSave();renderMain();toast('Backup imported')
    }catch(e){toast('Import failed')}
    ev.target.value=''
  };
  r.readAsText(f)
}
function clearAllOldData(){
  if(!confirm('Clear ALL training data?'))return;
  state={weeks:[],activeWeek:null,activeDay:'overview',customExercises:{},scheduleConfig:cloneDefaultSchedule()};
  localStorage.removeItem(STORAGE_KEY);
  renderMain();renderSidebar();toast('Data cleared')
}

// ── Single delegated event handler ──
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-action],[data-remove-day],[data-clear-slot],#wk-picker-btn,#settings-menu-btn,#new-week-sidebar,#start-week-btn,#new-week-picker,#close-wk-picker,#backup-btn,#import-btn,#clear-btn,#close-schedule,#cancel-schedule,#save-schedule,#add-day-btn');
  if(!t)return;
  if(t.id==='new-week-sidebar'||t.id==='start-week-btn'){newWeek();return}
  if(t.id==='new-week-picker'){newWeek();closeWkPicker();return}
  if(t.id==='wk-picker-btn'){openWkPicker();return}
  if(t.id==='close-wk-picker'){closeWkPicker();return}
  if(t.id==='settings-menu-btn'){toggleSettingsMenu();return}
  if(t.id==='backup-btn'){backupDataFile();closeSettingsMenu();return}
  if(t.id==='import-btn'){$('backup-file-input').click();closeSettingsMenu();return}
  if(t.id==='clear-btn'){clearAllOldData();closeSettingsMenu();return}
  if(t.id==='close-schedule'||t.id==='cancel-schedule'){closeScheduleConfig();return}
  if(t.id==='save-schedule'){saveScheduleConfig();return}
  if(t.id==='add-day-btn'){addScheduleDay();return}
  if(t.dataset.removeDay){removeScheduleDay(t.dataset.removeDay);return}
  if(t.dataset.clearSlot){assignDay(Number(t.dataset.clearSlot),null);return}
  const action=t.dataset.action;
  if(!action)return;
  if(action==='tab'){switchTab(t.dataset.tab);return}
  if(action==='schedule'){openScheduleConfig();return}
  if(action==='open-day'){openDay(t.dataset.day);return}
  if(action==='cal'){togCal(t.dataset.key);return}
  if(action==='prog'){setProg(t.dataset.day,t.dataset.idx,t.dataset.val);return}
  if(action==='add-ex'){addEx(t.dataset.day,Number(t.dataset.si));return}
  if(action==='del-ex'){delEx(t.dataset.day,Number(t.dataset.si),Number(t.dataset.ei));return}
});

document.addEventListener('change',e=>{
  const t=e.target;
  const action=t.dataset.action;
  if(action==='body-weight'){setBW(t.value);return}
  if(action==='date'){setDD(t.dataset.day,t.value);return}
  if(action==='field'){se(t.dataset.day,t.dataset.idx,t.dataset.field,t.value);return}
  if(action==='ex-name'){upExName(t.dataset.day,Number(t.dataset.si),Number(t.dataset.ei),t.value);return}
  if(action==='ex-muscle'){upExMuscle(t.dataset.day,Number(t.dataset.si),Number(t.dataset.ei),t.value);return}
  if(t.id==='backup-file-input'){importBackupFile(e);return}
});

// Close modals on backdrop click
document.getElementById('wk-picker').addEventListener('click',e=>{if(e.target===e.currentTarget)closeWkPicker()});
document.getElementById('schedule-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeScheduleConfig()});

window.addScheduleDay=addScheduleDay;
window.openScheduleConfig=openScheduleConfig;
window.closeScheduleConfig=closeScheduleConfig;
window.saveScheduleConfig=saveScheduleConfig;
window.removeScheduleDay=removeScheduleDay;
window.assignDay=assignDay;
window.openWkPicker=openWkPicker;

// Init
loadState();
renderSidebar();
if(state.activeWeek)renderMain();

})();
